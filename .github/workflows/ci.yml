name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests (no external deps — fast, runs anywhere)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        working-directory: tests
        run: make test

  # ---------------------------------------------------------------------------
  # Build — Windows (primary target)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Cache Ghostty source
        uses: actions/cache@v4
        with:
          path: build/_deps/ghostty-src
          key: ghostty-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Cache Ghostty build
        uses: actions/cache@v4
        with:
          path: build/ghostty-lib
          key: ghostty-lib-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release
        timeout-minutes: 30

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: myterm-windows-x64
          path: build/myterm.exe
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Build — Linux (for development/testing)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Cache Ghostty source
        uses: actions/cache@v4
        with:
          path: build/_deps/ghostty-src
          key: ghostty-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Cache Ghostty build
        uses: actions/cache@v4
        with:
          path: build/ghostty-lib
          key: ghostty-lib-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release
        timeout-minutes: 30

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: myterm-linux-x64
          path: build/myterm
          retention-days: 14
