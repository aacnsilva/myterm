name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — fast, no Zig/ghostty/Raylib needed
  # Uses the standalone Makefile with stub implementations.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        working-directory: tests
        run: make test

  # ---------------------------------------------------------------------------
  # Full Windows build — catches Ghostty/Zig/CMake integration regressions
  # before a release tag is pushed.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release
        timeout-minutes: 30

      - name: Smoke test
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tests/smoke_test.ps1 `
            -ExePath build/myterm.exe `
            -ScreenshotPath smoke_screenshot.png

      - name: Upload smoke test screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshot
          path: smoke_screenshot.png
          if-no-files-found: ignore
