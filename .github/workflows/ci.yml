name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests (no external deps — runs on any platform)
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        working-directory: tests
        run: make test

  # ---------------------------------------------------------------------------
  # Build — Windows (primary target)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.0

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: myterm-windows-x64
          path: build/myterm.exe
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Build — Linux (for development/testing)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl-dev ninja-build

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.0

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: myterm-linux-x64
          path: build/myterm
          retention-days: 14
