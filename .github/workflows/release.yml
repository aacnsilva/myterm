name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests gate
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        working-directory: tests
        run: make test

  # ---------------------------------------------------------------------------
  # Build Windows installer + portable zip
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release
        timeout-minutes: 30

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Compress-Archive -Path build/myterm.exe, README.md, LICENSE `
            -DestinationPath "dist/myterm-${{ steps.version.outputs.version }}-windows-x64.zip"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer\myterm.iss

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: myterm-windows-portable
          path: dist/myterm-*-windows-x64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: myterm-windows-installer
          path: dist/myterm-*-setup-x64.exe

  # ---------------------------------------------------------------------------
  # Build Linux tarball
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release
        timeout-minutes: 30

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          mkdir -p dist/myterm
          cp build/myterm README.md LICENSE dist/myterm/
          cd dist
          tar czf "myterm-${{ steps.version.outputs.version }}-linux-x64.tar.gz" myterm/

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: myterm-linux-tarball
          path: dist/myterm-*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release_notes.md << EOF
          ## Downloads

          | Platform | File | Description |
          |----------|------|-------------|
          | Windows | \`myterm-${VERSION}-setup-x64.exe\` | Installer (recommended) |
          | Windows | \`myterm-${VERSION}-windows-x64.zip\` | Portable (no install needed) |
          | Linux | \`myterm-${VERSION}-linux-x64.tar.gz\` | Binary tarball |

          ## Installation

          ### Windows Installer
          1. Download and run \`myterm-${VERSION}-setup-x64.exe\`
          2. Follow the setup wizard
          3. Optionally add to PATH for command-line access

          ### Windows Portable
          1. Extract \`myterm-${VERSION}-windows-x64.zip\`
          2. Run \`myterm.exe\`

          ### Linux
          \`\`\`bash
          tar xzf myterm-${VERSION}-linux-x64.tar.gz
          cd myterm
          chmod +x myterm
          ./myterm
          \`\`\`

          ## System Requirements
          - **Windows**: Windows 10 version 1809+ or Windows 11
          - **Linux**: X11, OpenGL 3.3+
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: myterm v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*
          fail_on_unmatched_files: false
