name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests gate
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        working-directory: tests
        run: make test

  # ---------------------------------------------------------------------------
  # Build Windows portable zip
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DMYTERM_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release
        timeout-minutes: 30

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Compress-Archive -Path build/myterm.exe, README.md, LICENSE `
            -DestinationPath "dist/myterm-${{ steps.version.outputs.version }}-windows-x64.zip"

      - name: Build installer
        shell: pwsh
        run: |
          Copy-Item build/myterm.exe . -Force
          iscc /DMyAppVersion="${{ steps.version.outputs.version }}" installer.iss
          Move-Item "myterm-${{ steps.version.outputs.version }}-windows-x64-setup.exe" dist/

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: myterm-windows-portable
          path: dist/myterm-*-windows-x64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: myterm-windows-installer
          path: dist/myterm-*-windows-x64-setup.exe

  # ---------------------------------------------------------------------------
  # Publish GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release_notes.md << 'NOTES_EOF'
          ## Downloads

          | File | Description |
          |------|-------------|
          | `myterm-VERSION-windows-x64-setup.exe` | Installer (recommended) |
          | `myterm-VERSION-windows-x64.zip` | Portable zip |

          ## Installation

          ### Installer
          1. Download and run `myterm-VERSION-windows-x64-setup.exe`
          2. Optionally add to PATH and create a desktop shortcut during setup

          ### Portable
          1. Extract `myterm-VERSION-windows-x64.zip`
          2. Run `myterm.exe`

          ## System Requirements
          - **Windows**: Windows 10 version 1809+ or Windows 11
          NOTES_EOF
          sed -i "s/VERSION/${VERSION}/g" release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: myterm v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*
          fail_on_unmatched_files: false
